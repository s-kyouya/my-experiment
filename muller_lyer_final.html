<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミュラー・リヤー錯視実験 (調整法)</title>
  
  <!-- jsPsych CDN Assets (v7.3.1) -->
  <script src="https://unpkg.com/jspsych@7.3.1"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-canvas-slider-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.2"></script>
  
  <!-- jsPsych Style -->
  <link href="https://unpkg.com/jspsych@7.3.1/css/jspsych.css" rel="stylesheet" type="text/css" />

  <style>
    /* 画面全体のスタイル設定：上下左右中央配置とダーク/ライト調和したプレミアム感のある背景 */
    body {
      background-color: #f8fafc;
      color: #1e293b;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .jspsych-content-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    .jspsych-content {
      max-width: 800px;
      padding: 2.5rem;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      text-align: center;
    }

    /* キャンバスの枠線と角丸 */
    canvas {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background-color: #ffffff;
      box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.03);
      display: block;
      margin: 0 auto;
      max-width: 100%;
      height: auto;
    }

    /* ボタン・フォーム要素の美化 */
    .jspsych-btn {
      background-color: #3b82f6 !important;
      color: white !important;
      border: none !important;
      border-radius: 8px !important;
      padding: 0.75rem 1.5rem !important;
      font-size: 1rem !important;
      font-weight: 600 !important;
      cursor: pointer;
      transition: all 0.2s ease !important;
      box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
    }

    .jspsych-btn:hover {
      background-color: #2563eb !important;
      transform: translateY(-1px);
      box-shadow: 0 6px 12px -1px rgba(59, 130, 246, 0.3);
    }

    /* スライダーの横幅とマージン調整 */
    .jspsych-slider, input[type="range"] {
      width: 100% !important;
      max-width: 500px;
      margin: 1.5rem auto !important;
      display: block;
    }

    /* 実験中提示されるプロンプト（試行数など）のスタイル */
    .trial-prompt {
      font-size: 1.1rem;
      font-weight: bold;
      color: #475569;
      margin-bottom: 1.5rem;
    }

    .instruction-text {
      text-align: left;
      line-height: 1.8;
      color: #334155;
      margin-bottom: 2rem;
    }

    .instruction-text h2 {
      text-align: center;
      color: #1e293b;
      margin-top: 0;
      margin-bottom: 1.5rem;
    }

    /* スライダーコンテナの調整 */
    .jspsych-canvas-slider-response-container {
      margin-top: 1.5rem;
    }

    /* データの簡易表示テーブル用 */
    .results-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1.5rem;
      font-size: 0.9rem;
    }

    .results-table th, .results-table td {
      border: 1px solid #e2e8f0;
      padding: 8px 12px;
      text-align: center;
    }

    .results-table th {
      background-color: #f1f5f9;
      font-weight: 600;
    }

    /* 参加者ID入力画面の入力フォーム美化 */
    .jspsych-survey-text-question input[type="text"] {
      width: 100%;
      max-width: 300px;
      padding: 0.5rem;
      font-size: 1.1rem;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      text-align: center;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

  <div id="jspsych-target"></div>

  <script>
    // 送信先GASのURL
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxLQTJbayh1-ktsli7yrNfS1nD9dUuZq-2b1ImYpdVIcBh3C4LfuGCAr2YAt__WdagX8w/exec';

    // jsPsychの初期化
    const jsPsych = initJsPsych({
      display_element: 'jspsych-target',
      on_finish: function() {
        const display_element = jsPsych.getDisplayElement();
        
        // 1. 送信中画面の表示
        display_element.innerHTML = `
          <div class="instruction-text" style="text-align: center;">
            <h2>データの送信中</h2>
            <p>現在、実験データを送信しています。しばらくそのままでお待ちください...</p>
            <div style="margin: 2rem auto; width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
          </div>
          <style>
            @keyframes spin {
              0% { transform: rotate(0deg); }
              100% { transform: rotate(360deg); }
            }
          </style>
        `;

        // 参加者情報の取得 (最初のsurvey-textの回答)
        const participantQuery = jsPsych.data.get().filter({trial_type: 'survey-text'}).values()[0];
        const subjectId = participantQuery && participantQuery.response ? participantQuery.response.Q0 : 'unknown';

        // 2. データ構造の定義（抽出・整形）
        const trials = jsPsych.data.get().filter({task: 'response'}).values();
        const refinedData = trials.map((t, index) => {
          const pse = Math.round(t.response);
          const errorAmount = pse - 200; // 200pxが標準刺激
          
          return {
            subject_id: subjectId,
            timestamp: new Date().toISOString(), // 送信時基準のISO時刻
            angle: t.angle,
            wing_length: t.feather_length,
            pse: pse,
            error_amount: errorAmount
          };
        });

        // 3. fetchによるGASへのPOST自動送信 (mode: 'no-cors' を指定)
        fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(refinedData)
        })
        .then(() => {
          // 4. 送信完了後の画面切り替え
          showFinalResults(display_element, refinedData);
        })
        .catch((error) => {
          console.error('Data transmission failed:', error);
          // 送信エラー時も参加者の不利益にならないよう結果表示に遷移する
          showFinalResults(display_element, refinedData, true);
        });
      }
    });

    // 送信完了・結果確認画面の描画処理
    function showFinalResults(displayElement, refinedData, isError = false) {
      let statusMessage = '実験終了。ご協力ありがとうございました。';
      if (isError) {
        statusMessage = '実験終了（ローカル保存完了）。ご協力ありがとうございました。';
      }

      let htmlResult = `
        <div class="instruction-text">
          <h2>${statusMessage}</h2>
          <p>測定されたデータは正常に処理されました。結果は以下の通りです。</p>
          <table class="results-table">
            <thead>
              <tr>
                <th>試行</th>
                <th>ニックネーム</th>
                <th>角度 (度)</th>
                <th>羽の長さ (px)</th>
                <th>標準刺激 (px)</th>
                <th>あなたの調整値 (px)</th>
                <th>錯視量 (px)</th>
              </tr>
            </thead>
            <tbody>
      `;

      refinedData.forEach((t, index) => {
        htmlResult += `
          <tr>
            <td>${index + 1}</td>
            <td>${t.subject_id}</td>
            <td>${t.angle}</td>
            <td>${t.wing_length}</td>
            <td>200</td>
            <td>${t.pse}</td>
            <td>${t.error_amount > 0 ? '+' : ''}${t.error_amount}</td>
          </tr>
        `;
      });

      htmlResult += `
            </tbody>
          </table>
          <p style="text-align: center; margin-top: 2rem;">
            ※ 錯視量 ＝ 調整値 － 標準刺激(200px)<br>
            (正の値は、標準刺激と同じ長さにみせるためにより長く調整したことを意味します)
          </p>
        </div>
      `;

      displayElement.innerHTML = htmlResult;
    }

    // 0. 参加者情報入力試行
    const participant_id_trial = {
      type: jsPsychSurveyText,
      questions: [
        { prompt: 'ニックネームを入力してください：', required: true, placeholder: '例: ニックネーム' }
      ],
      button_label: '次へ進む'
    };

    // 1. 教示画面 (スマホ対応：ボタン押下で実験開始)
    const instructions = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="instruction-text">
          <h2>ミュラー・リヤー錯視実験</h2>
          <p>この実験では、線の長さの知覚について測定します。</p>
          <p>画面には、上下に2本の線（矢印のような形）が表示されます。</p>
          <ul>
            <li><strong>上側の線（標準刺激）：</strong> 長さは<strong>200ピクセルで固定</strong>されており、両端に<strong>内向き</strong>の羽がついています。</li>
            <li><strong>下側の線（比較刺激）：</strong> 長さをスライダーで自由に変更できます。両端に<strong>外向き</strong>の羽がついています。</li>
          </ul>
          <p><strong>【あなたの課題】</strong><br>
          下側のスライダーを左右に動かし、<strong>下側の線の「軸（中央の横線）の長さ」が、上側の線の「軸の長さ」と「ちょうど同じ長さ」に見えるように調整</strong>してください。<br>
          調整ができたら、スライダーの下にある「決定」ボタンをクリックして次の試行に進んでください。</p>
          <p>実験は全部で <strong>12試行</strong> あります。</p>
        </div>
      `,
      choices: ['実験を開始する']
    };

    // 2. 実験デザインの設定
    // 独立変数: 角度(15, 75度) × 羽の長さ(20, 50px)
    const factors = {
      angle: [15, 75],
      feather_length: [20, 50]
    };

    // 4条件を各3回 = 12試行のフルファクトリアルデザインを作成
    const design = jsPsych.randomization.factorial(factors, 3);

    // 3. ミュラー・リヤー図形の描画関数
    function drawMullerLyer(ctx, x, y, length, angle, f_length, type) {
      const halfLength = length / 2;
      const startX = x - halfLength;
      const endX = x + halfLength;

      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';

      // 軸（メインの横線）の描画
      ctx.beginPath();
      ctx.moveTo(startX, y);
      ctx.lineTo(endX, y);
      ctx.stroke();

      // 羽の描画用パラメータ（ラジアン変換）
      const rad = (angle * Math.PI) / 180;
      
      // 内向き羽（標準刺激： >----< ）と 外向き羽（比較刺激： <----> ）の分岐
      let directionMultiplier = (type === 'inward') ? 1 : -1;

      // 左側の端の羽を描画してストローク
      ctx.beginPath();
      ctx.moveTo(startX, y);
      ctx.lineTo(startX + directionMultiplier * f_length * Math.cos(rad), y - f_length * Math.sin(rad));
      ctx.moveTo(startX, y);
      ctx.lineTo(startX + directionMultiplier * f_length * Math.cos(rad), y + f_length * Math.sin(rad));
      ctx.stroke();
      
      // 右側の端の羽を描画してストローク
      ctx.beginPath();
      ctx.moveTo(endX, y);
      ctx.lineTo(endX - directionMultiplier * f_length * Math.cos(rad), y - f_length * Math.sin(rad));
      ctx.moveTo(endX, y);
      ctx.lineTo(endX - directionMultiplier * f_length * Math.cos(rad), y + f_length * Math.sin(rad));
      ctx.stroke();
    }

    // Canvas全体の描画を管理する関数 (共通化)
    function drawCanvasContent(canvas, currentLength, angle, feather_length) {
      const ctx = canvas.getContext('2d');
      if (!ctx) return;
      
      // Canvasのクリアと背景描画
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const centerX = canvas.width / 2;
      
      // 上半分：標準刺激 (内向き羽, 200px固定)
      const stdY = canvas.height * 0.3;
      const stdLength = 200;
      drawMullerLyer(ctx, centerX, stdY, stdLength, angle, feather_length, 'inward');

      // 下半分：比較刺激 (外向き羽, 可変)
      const compY = canvas.height * 0.7;
      drawMullerLyer(ctx, centerX, compY, currentLength, angle, feather_length, 'outward');
    }

    // 4. トライアルタイムラインの構築
    const trials = [];

    design.forEach((config, index) => {
      // 試行ごとに初期値をランダムに設定（100px 〜 300px）
      const randomStartVal = Math.floor(Math.random() * (300 - 100 + 1)) + 100;

      const trial = {
        type: jsPsychCanvasSliderResponse,
        stimulus: function(c, slider_value) {
          // 初期表示時の描画処理
          let compLength = parseFloat(slider_value);
          if (isNaN(compLength)) {
            compLength = randomStartVal;
          }
          drawCanvasContent(c, compLength, config.angle, config.feather_length);
        },
        canvas_size: [400, 600], // [高さ, 幅]
        min: 50,
        max: 350,
        slider_start: randomStartVal,
        step: 1,
        slider_width: 500,
        button_label: '決定',
        prompt: `<div class="trial-prompt">試行 ${index + 1} / 12</div>`,
        data: {
          task: 'response',
          angle: config.angle,
          feather_length: config.feather_length,
          start_val: randomStartVal
        },
        // 試行読み込み完了時にスライダーイベントを完全にバインド
        on_load: function() {
          const canvas = document.querySelector('canvas');
          const slider = document.querySelector('input[type="range"]');
          
          if (canvas && slider) {
            // スライダーの初期値を改めて描画に反映
            drawCanvasContent(canvas, parseFloat(slider.value), config.angle, config.feather_length);

            // 描画アップデート用イベントハンドラ
            const updateCanvas = function() {
              const currentVal = parseFloat(slider.value);
              if (!isNaN(currentVal)) {
                drawCanvasContent(canvas, currentVal, config.angle, config.feather_length);
              }
            };

            // ドラッグ中(input)とドラッグ終了時(change)の両方のイベントを監視
            slider.addEventListener('input', updateCanvas);
            slider.addEventListener('change', updateCanvas);
          }
        }
      };

      trials.push(trial);
    });

    // 5. タイムラインの結合と開始
    // 参加者情報入力試行を先頭に追加
    const timeline = [participant_id_trial, instructions, ...trials];
    jsPsych.run(timeline);
  </script>
</body>
</html>
