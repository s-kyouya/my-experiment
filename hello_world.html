<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験室</title>
    <style>
        /* 基本的なリセットと背景の設定 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f4f9; /* 薄いグレーの背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* コンテンツを中央に配置するコンテナ */
        .container {
            text-align: center;
            padding: 2rem;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 90%;
        }

        /* 大きなタイトル文字 */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            font-weight: 700;
        }

        /* 青いボタンのスタイル */
        .start-button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 123, 255, 0.2);
        }

        /* ホバー時の挙動 */
        .start-button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        /* クリック（アクティブ）時の挙動 */
        .start-button:active {
            transform: translateY(0);
        }

        /* カスタムメッセージボックス（alertの代わり） */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .close-btn {
            margin-top: 1.5rem;
            padding: 8px 20px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>心理学実験室へようこそ</h1>
        <button class="start-button" id="startButton">実験を開始する</button>
    </div>

    <!-- カスタムメッセージボックス -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <p id="modalMessage" style="font-size: 1.2rem; margin: 0;">Hello World!</p>
            <button class="close-btn" id="closeBtn">閉じる</button>
        </div>
    </div>

    <script>
        // ボタンとモーダルの要素を取得
        const startButton = document.getElementById('startButton');
        const modalOverlay = document.getElementById('modalOverlay');
        const closeBtn = document.getElementById('closeBtn');

        // 実験開始ボタンのクリックイベント
        startButton.addEventListener('click', () => {
            // 指示通り、アラート（風のUI）を表示
            // ブラウザのalert()はUXを損なうため、カスタムUIで実装しています
            modalOverlay.style.display = 'flex';
        });

        // 閉じるボタンのイベント
        closeBtn.addEventListener('click', () => {
            modalOverlay.style.display = 'none';
        });

        // 背景クリックで閉じる
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.style.display = 'none';
            }
        });
    </script>
</body>
</html>
